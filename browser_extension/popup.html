
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Secure Vault</title>
  <style>
    body { font-family: Arial, sans-serif; width: 380px; margin: 12px; }
    input { width: 100%; margin: 4px 0 10px; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; margin-top: 6px; cursor: pointer; }
    .small { color: #555; font-size: 12px; }
    #status { margin-top: 8px; font-size: 12px; white-space: pre-wrap; }
    .match-item { padding: 8px; margin: 4px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #f9f9f9; }
    .match-item:hover { background: #e9e9e9; }
    .match-service { font-weight: bold; color: #333; }
    .match-username { color: #666; font-size: 11px; }
    #matchesList { max-height: 200px; overflow-y: auto; margin: 8px 0; }
    #phraseDialog { display: none; margin-top: 12px; padding: 12px; background: #f5f5f5; border-radius: 4px; }
    #phraseInput { width: 100%; padding: 8px; margin: 8px 0; }
    .dialog-buttons { display: flex; gap: 8px; }
    .dialog-buttons button { flex: 1; }
  </style>
</head>
<body>
  <h3>Secure Vault</h3>
  <label>Local API URL</label>
  <input id="apiUrl" placeholder="http://127.0.0.1:5005" />
  <label>Token</label>
  <input id="token" placeholder="Paste token from desktop app" />
  <button id="save">Save Settings</button>
  <button id="reset">Reset Default</button>
  <button id="health">Test Connection</button>
  <button id="autofill">Autofill Current Page</button>
  <div class="small">Keep desktop app logged in while using extension.</div>
  
  <div id="matchesList" style="display: none;"></div>
  
  <div id="phraseDialog">
    <div style="font-weight: bold; margin-bottom: 8px;">Enter Master Phrase</div>
    <div class="small" style="margin-bottom: 8px;">Enter your login passphrase to autofill credentials.</div>
    <input type="password" id="phraseInput" placeholder="Master phrase" />
    <div class="dialog-buttons">
      <button id="verifyPhrase">Verify & Fill</button>
      <button id="cancelPhrase" style="background: #ccc;">Cancel</button>
    </div>
  </div>
  
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
